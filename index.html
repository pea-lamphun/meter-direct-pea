<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#5B2B82" />
<title>ระบบชุดอุปกรณ์ช่วยต่อตรงมิเตอร์ฉุกเฉิน - PEA ลำพูน</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --primary:#5B2B82; --primary-700:#46206A; --primary-50:#F4ECFA;
    --gold:#C49A3A;
    --bg:#F4F4F8; --card:#FFFFFF;
    --text:#1F2430; --muted:#6B7280; --border:#E6E8EE; --border-2:#D7DBE2;
    --red:#DC2626; --red-50:#FDECEC;
    --green:#16A34A; --green-50:#E8F8EE;
    --shadow:0 1px 3px rgba(16,24,40,.05), 0 8px 24px rgba(16,24,40,.05);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Sarabun',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; line-height:1.5}
  h1,h2,h3,.font-display{font-family:'Prompt','Sarabun',sans-serif}
  button{font-family:inherit; cursor:pointer}
  input,select,textarea{font-family:inherit}

  /* ===== App bar ===== */
  .appbar{background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20}
  .appbar-inner{max-width:760px; margin:0 auto; padding:13px 18px; display:flex; align-items:center; gap:12px}
  body[data-view="admin"] .appbar-inner{max-width:1200px}
  .logo{width:44px; height:44px; border-radius:13px; background:linear-gradient(135deg,var(--primary),var(--primary-700));
    display:grid; place-items:center; color:#fff; flex:none; box-shadow:0 4px 12px rgba(91,43,130,.28)}
  .title{font-weight:700; font-size:1.0rem; line-height:1.25}
  .subtitle{color:var(--muted); font-size:.8rem; margin-top:1px}
  .bar-spacer{flex:1}
  .icon-btn{width:40px; height:40px; border-radius:11px; border:1px solid var(--border); background:#fff; color:var(--muted);
    display:grid; place-items:center; transition:background .12s}
  .icon-btn:hover{background:var(--primary-50); color:var(--primary)}

  /* ===== Layout ===== */
  .wrap{max-width:760px; margin:0 auto; padding:20px 18px 60px}
  body[data-view="admin"] .wrap{max-width:1200px}
  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow)}
  .intro{display:flex; gap:12px; align-items:flex-start; background:var(--primary-50); border:1px solid #E7D8F2;
    border-radius:14px; padding:14px 16px; margin-bottom:18px; color:#5a3a78; font-size:.92rem}
  .intro b{color:var(--primary-700)}

  /* ===== Form ===== */
  form{padding:20px 18px}
  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}
  label{display:block; font-weight:600; font-size:.95rem; margin-bottom:7px}
  .req{color:var(--red); margin-left:3px}
  .hint{color:var(--muted); font-weight:400; font-size:.82rem; margin-top:5px}
  .opt{color:var(--muted); font-weight:400; font-size:.82rem; margin-left:6px}
  .input, select{width:100%; padding:13px 14px; border:1.5px solid var(--border-2); border-radius:11px;
    font-size:1rem; background:#fff; color:var(--text); transition:border-color .15s, box-shadow .15s}
  .input:focus, select:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(91,43,130,.13)}
  .input.err, select.err{border-color:var(--red); box-shadow:0 0 0 3px rgba(220,38,38,.1)}
  select{appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat:no-repeat; background-position:right 13px center; padding-right:42px}
  .photo-box{border:2px dashed var(--border-2); border-radius:13px; background:#FAFAFC;
    min-height:150px; display:grid; place-items:center; cursor:pointer; overflow:hidden;
    transition:border-color .15s, background .15s; position:relative}
  .photo-box:hover{border-color:var(--primary); background:var(--primary-50)}
  .photo-box.err{border-color:var(--red)}
  .photo-box img{width:100%; height:100%; max-height:280px; object-fit:contain; display:block}
  .photo-ph{text-align:center; color:var(--muted); padding:22px}
  .photo-ph .ico{font-size:1.7rem}
  .photo-ph .t{font-weight:600; margin-top:6px; color:#4b5563}
  .photo-ph .s{font-size:.8rem; margin-top:2px}
  .photo-redo{position:absolute; right:10px; bottom:10px; background:rgba(31,36,48,.82); color:#fff;
    border:none; border-radius:9px; padding:7px 13px; font-size:.82rem; font-weight:600}
  .btn{width:100%; padding:15px; border:none; border-radius:12px; font-size:1.05rem; font-weight:600;
    color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary-700));
    box-shadow:0 6px 16px rgba(91,43,130,.28); transition:transform .08s, opacity .15s; margin-top:6px}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.6; cursor:not-allowed}
  .btn .spin{display:inline-block; width:17px; height:17px; border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .done{padding:46px 22px; text-align:center}
  .done .ring{width:84px; height:84px; border-radius:50%; background:var(--green-50);
    display:grid; place-items:center; margin:0 auto 16px; color:var(--green)}
  .done h2{margin:0 0 6px; font-size:1.4rem}
  .done p{color:var(--muted); margin:0 0 22px}

  /* ===== KPI cards (Dashboard) ===== */
  .kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:16px}
  .kpi{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); position:relative; overflow:hidden}
  .kpi .lab{color:var(--muted); font-size:.86rem; font-weight:500}
  .kpi .num{font-family:'Prompt',sans-serif; font-size:2.05rem; font-weight:700; line-height:1.1; margin-top:6px}
  .kpi .accent{position:absolute; left:0; top:0; bottom:0; width:5px}
  .kpi.total .accent{background:var(--primary)}
  .kpi.active .accent{background:var(--red)} .kpi.active .num{color:var(--red)}
  .kpi.done .accent{background:var(--green)} .kpi.done .num{color:var(--green)}
  .kpi.dev .accent{background:var(--gold)} .kpi.dev .num{color:#9a7522}
  .devrow{background:var(--card); border:1px solid var(--border); border-radius:13px; padding:12px 16px; margin-bottom:18px;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap; box-shadow:var(--shadow); font-size:.9rem}
  .devrow .dl{color:var(--muted); font-weight:600}
  .dev-chip{background:#FFF6E5; color:#8a6914; border:1px solid #F0E0B5; border-radius:999px; padding:3px 11px; font-weight:600; font-size:.85rem}
  .dev-none{color:var(--green); font-weight:600}

  /* ===== Toolbar ===== */
  .toolbar{display:flex; gap:12px; align-items:center; margin-bottom:14px; flex-wrap:wrap}
  .tabs{display:inline-flex; background:var(--card); border:1px solid var(--border); border-radius:11px; padding:4px; gap:3px}
  .tab{border:none; background:transparent; color:var(--muted); padding:8px 14px; border-radius:8px; font-weight:600; font-size:.9rem}
  .tab.on{background:var(--primary); color:#fff}
  .tab .cnt{opacity:.75; margin-left:5px; font-weight:600}
  .search{flex:1; min-width:200px; position:relative}
  .search input{width:100%; padding:11px 14px 11px 40px; border:1.5px solid var(--border-2); border-radius:11px; font-size:.95rem; background:#fff}
  .search input:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(91,43,130,.13)}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted)}
  .period-sel{appearance:none; width:auto; border:1px solid var(--border); background:var(--card); color:var(--text); font-weight:600; font-size:.9rem; border-radius:11px; padding:9px 36px 9px 14px; cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat:no-repeat; background-position:right 12px center}
  .period-sel:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(91,43,130,.13)}

  /* ===== Table (desktop) ===== */
  .table-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
  .tscroll{overflow-x:auto}
  table{width:100%; border-collapse:collapse; min-width:1080px}
  thead th{background:#FAFAFC; text-align:left; font-size:.82rem; color:#52607a; font-weight:700; padding:13px 14px;
    border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0}
  tbody td{padding:13px 14px; border-bottom:1px solid #F0F1F5; font-size:.9rem; vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#FCFBFE}
  .dt{white-space:nowrap; color:#374151}
  .dt .d{font-weight:600} .dt .t{color:var(--muted); font-size:.82rem}
  .meter-no{font-weight:600; font-variant-numeric:tabular-nums}
  .muted-cell{color:var(--muted)}
  .devbadge{display:inline-grid; place-items:center; min-width:30px; height:30px; padding:0 8px; border-radius:8px;
    background:var(--primary-50); color:var(--primary-700); font-weight:700; font-size:.9rem}
  .thumb{width:54px; height:54px; border-radius:9px; object-fit:cover; cursor:pointer; border:1px solid var(--border); display:block; background:#f0f0f3}
  .chip{display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:6px 13px; font-weight:600; font-size:.85rem; color:#fff; white-space:nowrap}
  .chip.red{background:var(--red)}
  .chip.green{background:var(--green)}
  .chip .dot{width:7px; height:7px; border-radius:50%; background:#fff; opacity:.9}
  .act-btn{margin-top:8px; display:block; border:1px solid var(--green); color:var(--green); background:#fff; border-radius:9px;
    padding:7px 11px; font-size:.82rem; font-weight:600; transition:background .12s}
  .act-btn:hover{background:var(--green-50)}
  .revert{margin-top:8px; display:block; border:none; background:transparent; color:var(--muted); font-size:.78rem; text-decoration:underline; padding:2px}
  .del-btn{border:1px solid #F0C2C2; color:var(--red); background:#fff; border-radius:8px; width:34px; height:34px; display:inline-grid; place-items:center; transition:background .12s, border-color .12s}
  .del-btn:hover{background:var(--red-50); border-color:var(--red)}
  .empty{padding:54px 20px; text-align:center; color:var(--muted)}
  .empty .ico{font-size:2.2rem; opacity:.5}

  /* ===== Mobile cards ===== */
  .cards{display:none}
  .rcard{background:var(--card); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); padding:15px; margin-bottom:13px}
  .rcard .top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px}
  .rcard .when{font-size:.8rem; color:var(--muted)}
  .rcard .mno{font-family:'Prompt',sans-serif; font-weight:700; font-size:1.05rem; margin-top:2px}
  .rcard dl{margin:0; display:grid; grid-template-columns:auto 1fr; gap:6px 12px; font-size:.9rem}
  .rcard dt{color:var(--muted)} .rcard dd{margin:0; text-align:right; font-weight:500; word-break:break-word}
  .rcard .photos{display:flex; gap:9px; margin:12px 0}
  .rcard .photos figure{margin:0; flex:1}
  .rcard .photos figcaption{font-size:.72rem; color:var(--muted); margin-bottom:4px; text-align:center}
  .rcard .photos img{width:100%; height:96px; object-fit:cover; border-radius:9px; border:1px solid var(--border); cursor:pointer; background:#f0f0f3}
  .rcard .foot{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:6px; border-top:1px solid #F0F1F5; padding-top:12px; flex-wrap:wrap}
  .rcard .mact{border:1px solid var(--green); color:var(--green); background:#fff; border-radius:10px; padding:9px 14px; font-weight:600; font-size:.85rem}

  /* ===== Lightbox ===== */
  .lb{position:fixed; inset:0; background:rgba(15,18,28,.88); z-index:100; display:grid; place-items:center; padding:18px}
  .lb img{max-width:100%; max-height:88vh; border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .lb-x{position:fixed; top:16px; right:18px; width:44px; height:44px; border-radius:50%; border:none; background:rgba(255,255,255,.15);
    color:#fff; font-size:1.5rem; display:grid; place-items:center}
  .lb-cap{position:fixed; bottom:18px; left:0; right:0; text-align:center; color:#fff; font-size:.9rem; opacity:.85}

  /* ===== Modal (เปลี่ยน PIN) ===== */
  .modal-bg{position:fixed; inset:0; background:rgba(15,18,28,.5); z-index:80; display:grid; place-items:center; padding:20px}
  .modal{width:100%; max-width:380px; background:#fff; border-radius:18px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal h3{margin:0 0 4px}
  .modal p{color:var(--muted); font-size:.86rem; margin:0 0 16px}
  .modal label{display:block; font-weight:600; font-size:.9rem; margin:12px 0 6px}
  .modal input{width:100%; padding:12px 14px; border:1.5px solid var(--border-2); border-radius:10px; font-size:1.1rem; letter-spacing:6px; text-align:center}
  .modal input:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(91,43,130,.13)}
  .modal .row{display:flex; gap:10px; margin-top:20px}
  .modal .row button{flex:1; padding:12px; border-radius:10px; font-weight:600; font-size:.95rem; border:none}
  .modal .cancel{background:#F1F2F6; color:#475467}
  .modal .save{background:linear-gradient(135deg,var(--primary),var(--primary-700)); color:#fff}
  .modal .del-confirm{background:linear-gradient(135deg,var(--red),#b91c1c); color:#fff}
  .modal .mmsg{font-size:.85rem; margin-top:10px; min-height:18px; font-weight:500}

  /* ===== Toast ===== */
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:90; background:#1f2937; color:#fff;
    padding:13px 20px; border-radius:12px; font-weight:500; box-shadow:0 10px 30px rgba(0,0,0,.25); display:flex; align-items:center; gap:9px; max-width:90vw}
  .toast.ok{background:#15803d}
  .toast.bad{background:#b91c1c}

  /* ===== PIN gate ===== */
  .pin-screen{min-height:100dvh; display:grid; place-items:center; padding:24px; background:radial-gradient(1200px 600px at 50% -10%, #ECE0F6 0%, var(--bg) 55%)}
  .pin-card{width:100%; max-width:360px; background:var(--card); border:1px solid var(--border); border-radius:22px; box-shadow:0 20px 50px rgba(16,24,40,.1); padding:30px 26px; text-align:center}
  .pin-card .logo{width:56px; height:56px; border-radius:16px; margin:0 auto 16px}
  .pin-card h2{margin:0; font-size:1.2rem}
  .pin-card .desc{color:var(--muted); font-size:.88rem; margin:6px 0 22px}
  .pin-dots{display:flex; gap:14px; justify-content:center; margin-bottom:8px}
  .pin-dot{width:15px; height:15px; border-radius:50%; border:2px solid var(--border-2); background:#fff; transition:all .15s}
  .pin-dot.on{background:var(--primary); border-color:var(--primary); transform:scale(1.05)}
  .pin-dot.bad{background:var(--red); border-color:var(--red); animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .pin-msg{font-size:.85rem; height:20px; margin-bottom:14px; color:var(--red); font-weight:500}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:12px}
  .key{height:62px; border-radius:14px; border:1px solid var(--border); background:#fff; font-size:1.4rem; font-weight:600; color:var(--text); transition:background .12s, transform .06s}
  .key:active{background:var(--primary-50); transform:scale(.96)}
  .key.fn{font-size:.95rem; color:var(--muted); background:#FAFAFC}
  .key.blank{background:transparent; border:none; cursor:default}
  .setup-note{background:#FFF8E8; border:1px solid #F0E0B5; color:#7a5d12; border-radius:11px; padding:10px 13px; font-size:.82rem; margin-bottom:18px; text-align:left}

  /* ===== Responsive ===== */
  @media (max-width:980px){ .kpis{grid-template-columns:repeat(2,1fr)} }
  @media (max-width:760px){
    .title{font-size:.9rem} .subtitle{font-size:.73rem}
    .wrap{padding:16px 14px 56px}
    form{padding:18px 15px}
    .table-card{background:transparent; border:none; box-shadow:none; overflow:visible}
    .tscroll{display:none}
    .cards{display:block}
    .toolbar{gap:10px}
    .kpi .num{font-size:1.7rem}
  }
  @media (max-width:420px){ .kpis{gap:10px} .kpi{padding:14px} }
</style>
</head>

<script type="text/babel">
/* ============================================================
   ⚙️  CONFIG — แก้ไขที่เดียว (ใช้ทั้งหน้าฟอร์มและ Dashboard)
   ============================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyD_4pudGRmwZeTM6kYIjFTJbuQ45kFXhPI",
  authDomain:        "pea-meter-direct.firebaseapp.com",
  databaseURL:       "https://pea-meter-direct-default-rtdb.asia-southeast1.firebasedatabase.app",

  messagingSenderId: "189701628688",
  appId:             "1:189701628688:web:559d8306b62d185de97b95"
};
const IMGBB_KEY       = "906f6ec77af88f56409be021dac1625a";   // คีย์ ImgBB สำหรับอัปโหลดรูปในหน้าฟอร์ม
const APPS_SCRIPT_URL = "";                    // URL Apps Script (/exec) สำหรับแจ้งเตือน LINE — เว้นว่างได้ถ้ายังไม่ทำ
const DEVICE_COUNT    = 20;                    // จำนวนเครื่องนวัตกรรม (dropdown 1..20)
/* ============================================================
   2 ลิงค์การใช้งาน — ไฟล์เดียวกัน แยกด้วยท้าย URL:
     • ฟอร์มกรอกข้อมูล (ช่างแก้ไฟ)   →  <url>/
     • Dashboard (ช่างแผนกมิเตอร์)    →  <url>/#admin
   ============================================================ */

const { useState, useEffect, useRef, useMemo } = React;

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

const ST_ACTIVE = "ต่อตรง";
const ST_DONE   = "ต่อกลับเรียบร้อย";
const DASH_URL  = location.origin + location.pathname + "#admin";  // ลิงค์ Dashboard (แนบในข้อความ LINE)

/* ---------- helpers ---------- */
const norm = (s) => (s == null ? "" : String(s)).replace(/[\u200B-\u200D\uFEFF\u00A0]/g, "").trim();

async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function loadImage(file){
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = url;
  });
}
async function resizeImage(file, maxDim = 1280, quality = 0.82){
  try{
    const img = await loadImage(file);
    let { naturalWidth:w, naturalHeight:h } = img;
    if (Math.max(w,h) > maxDim){ const sc = maxDim / Math.max(w,h); w = Math.round(w*sc); h = Math.round(h*sc); }
    const cv = document.createElement("canvas");
    cv.width = w; cv.height = h;
    cv.getContext("2d").drawImage(img, 0, 0, w, h);
    return await new Promise(r => cv.toBlob(r, "image/jpeg", quality));
  }catch(e){ return file; }
}
async function uploadToImgBB(blob){
  const fd = new FormData();
  fd.append("image", blob, "photo.jpg");
  const r = await fetch("https://api.imgbb.com/1/upload?key=" + encodeURIComponent(IMGBB_KEY), { method:"POST", body: fd });
  const j = await r.json();
  if (!j || !j.success) throw new Error("อัปโหลดรูปไม่สำเร็จ");
  const d = j.data;
  return { url: d.display_url || d.url, thumb: (d.thumb && d.thumb.url) || d.display_url || d.url };
}

const TH_M = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
function fmtDate(ms){ const d = new Date(ms); return `${d.getDate()} ${TH_M[d.getMonth()]} ${d.getFullYear()+543}`; }
function fmtTime(ms){ const d = new Date(ms); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")} น.`; }
function fmtFull(ms){ return fmtDate(ms) + " " + fmtTime(ms); }
function isToday(ms){ const d=new Date(ms), n=new Date(); return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear(); }
function inPeriod(ms, period){
  if (!period || period === "all") return true;
  const d = new Date(ms), n = new Date();
  if (period === "thisMonth") return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth();
  if (period === "lastMonth"){ const lm = new Date(n.getFullYear(), n.getMonth()-1, 1); return d.getFullYear()===lm.getFullYear() && d.getMonth()===lm.getMonth(); }
  if (period === "thisYear") return d.getFullYear()===n.getFullYear();
  if (period.indexOf("year:") === 0) return d.getFullYear()===Number(period.slice(5));
  return true;
}

/* ====================================================================
   PIN GATE (ใช้ร่วมกันทั้งสองหน้า)
   ==================================================================== */
function PinGate({ onUnlock }){
  const [storedHash, setStoredHash] = useState(null);   // null=กำลังโหลด, ""=ยังไม่เคยตั้ง
  const [setupMode, setSetupMode] = useState(false);
  const [stage, setStage] = useState("enter");          // enter | setup1 | setup2
  const [code, setCode] = useState("");
  const [confirmFirst, setConfirmFirst] = useState("");
  const [msg, setMsg] = useState("");
  const [bad, setBad] = useState(false);

  useEffect(() => {
    db.ref("config/pinHash").get()
      .then(snap => {
        const h = snap.exists() ? norm(snap.val()) : "";
        if (!h){ setSetupMode(true); setStage("setup1"); }
        setStoredHash(h);
      })
      .catch(() => { setMsg("อ่านค่าจากฐานข้อมูลไม่ได้ ตรวจ Rules ของ Firebase"); setStoredHash(""); });
  }, []);

  const pressNum = (n) => { setBad(false); setMsg(""); setCode(c => c.length >= 4 ? c : c + n); };
  const del = () => { setBad(false); setMsg(""); setCode(c => c.slice(0,-1)); };

  useEffect(() => {
    if (code.length !== 4) return;
    (async () => {
      if (stage === "enter"){
        if (await sha256(code) === storedHash){ sessionStorage.setItem("pea_unlocked","1"); onUnlock(); }
        else { setBad(true); setMsg("รหัสไม่ถูกต้อง ลองใหม่อีกครั้ง"); setTimeout(()=>{ setCode(""); setBad(false); }, 600); }
      } else if (stage === "setup1"){
        setConfirmFirst(code); setTimeout(()=>{ setCode(""); setStage("setup2"); setMsg(""); }, 150);
      } else if (stage === "setup2"){
        if (code === confirmFirst){ await db.ref("config/pinHash").set(await sha256(code)); sessionStorage.setItem("pea_unlocked","1"); onUnlock(); }
        else { setBad(true); setMsg("รหัสไม่ตรงกัน เริ่มตั้งใหม่"); setTimeout(()=>{ setCode(""); setConfirmFirst(""); setStage("setup1"); setBad(false); }, 700); }
      }
    })();
  }, [code]); // eslint-disable-line

  if (storedHash === null) return <Splash msg="กำลังโหลด…" />;

  const heading = stage==="enter" ? "ใส่รหัส PIN เพื่อเข้าใช้งาน" : stage==="setup1" ? "ตั้งรหัส PIN ครั้งแรก" : "ยืนยันรหัส PIN อีกครั้ง";
  const desc = stage==="enter" ? "รหัสผ่าน 4 หลัก" : stage==="setup1" ? "กำหนดรหัส 4 หลักสำหรับระบบนี้" : "พิมพ์รหัสเดิมซ้ำเพื่อยืนยัน";

  return (
    <div className="pin-screen">
      <div className="pin-card">
        <div className="logo"><BoltIcon s={28}/></div>
        <h2>{heading}</h2>
        <div className="desc">{desc}</div>
        {setupMode && stage !== "enter" && <div className="setup-note">ยังไม่เคยตั้งรหัสในระบบนี้ — กำหนดรหัส 4 หลักได้เลย ระบบจะจำไว้ในฐานข้อมูล (ไม่เก็บในโค้ด)</div>}
        <div className="pin-dots">{[0,1,2,3].map(i => <div key={i} className={"pin-dot" + (i<code.length?" on":"") + (bad?" bad":"")}></div>)}</div>
        <div className="pin-msg">{msg}</div>
        <div className="keypad">
          {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} className="key" onClick={()=>pressNum(String(n))}>{n}</button>)}
          <div className="key blank"></div>
          <button className="key" onClick={()=>pressNum("0")}>0</button>
          <button className="key fn" onClick={del}>ลบ</button>
        </div>
      </div>
    </div>
  );
}

  );
}

/* ====================================================================
   DELETE MODAL (ยืนยันด้วย PIN ก่อนลบ)
   ==================================================================== */
function DeleteModal({ rec, onClose, onDeleted }){
  const [code, setCode] = useState("");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const onlyDigits = (v) => v.replace(/\D/g,"").slice(0,4);
  const doDelete = async () => {
    setMsg("");
    if (code.length !== 4) return setMsg("ใส่รหัส PIN 4 หลัก");
    setBusy(true);
    try{
      const snap = await db.ref("config/pinHash").get();
      const h = snap.exists() ? norm(snap.val()) : "";
      if (await sha256(code) !== h){ setMsg("รหัส PIN ไม่ถูกต้อง"); setBusy(false); return; }
      await db.ref("records/" + rec.id).remove();
      onDeleted();
    }catch(e){ setMsg("ลบไม่สำเร็จ: " + (e.message||"")); setBusy(false); }
  };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={(e)=>e.stopPropagation()}>
        <h3>ลบรายการนี้?</h3>
        <p>มิเตอร์ลูกที่เสีย: <b>{rec.brokenMeterNo || "-"}</b> · ผู้ดำเนินการ: {rec.operatorName || "-"}<br/>การลบกู้คืนไม่ได้ — ใส่รหัส PIN เพื่อยืนยัน</p>
        <label>รหัส PIN</label>
        <input inputMode="numeric" autoFocus value={code} onChange={(e)=>setCode(onlyDigits(e.target.value))} placeholder="••••" />
        <div className="mmsg" style={{color:'var(--red)'}}>{msg}</div>
        <div className="row">
          <button className="cancel" onClick={onClose}>ยกเลิก</button>
          <button className="del-confirm" disabled={busy} onClick={doDelete}>{busy?"กำลังลบ…":"ลบรายการ"}</button>
        </div>
      </div>
    </div>
  );
}

  );
}

  useEffect(() => {
    const ref = db.ref("records");
    const cb = ref.on("value", (snap) => {
      const arr = [];
      snap.forEach(ch => { arr.push({ id: ch.key, ...ch.val() }); });
      arr.sort((x,y) => (y.timestamp||0) - (x.timestamp||0)); // ใหม่สุดอยู่บน
      setRecords(arr); setLoading(false);
    }, () => setLoading(false));
    return () => ref.off("value", cb);
  }, []);

  const periodRecords = useMemo(() => records.filter(r => inPeriod(r.timestamp, period)), [records, period]);

  const yearOptions = useMemo(() => {
    const cur = new Date().getFullYear();
    return [...new Set(records.map(r => new Date(r.timestamp).getFullYear()).filter(Boolean))]
      .filter(y => y !== cur).sort((a,b) => b - a);
  }, [records]);

  const stats = useMemo(() => {
    const active = periodRecords.filter(r => r.status !== ST_DONE);
    const done   = periodRecords.filter(r => r.status === ST_DONE);
    const devs   = [...new Set(active.map(r => r.deviceNo).filter(Boolean))].sort((a,b)=>a-b);
    return { total: periodRecords.length, active: active.length, done: done.length, devs, today: periodRecords.filter(r=>isToday(r.timestamp)).length };
  }, [periodRecords]);

  const filtered = useMemo(() => {
    let rows = periodRecords;
    if (filter === "active") rows = rows.filter(r => r.status !== ST_DONE);
    if (filter === "done")   rows = rows.filter(r => r.status === ST_DONE);
    const k = norm(q).toLowerCase();
    if (k){
      rows = rows.filter(r => [r.operatorName, r.brokenMeterNo, r.customerNo, r.customerName, r.customerPhone, "เครื่องที่ "+r.deviceNo]
        .map(v => norm(v).toLowerCase()).some(v => v.includes(k)));
    }
    return rows;
  }, [periodRecords, filter, q]);

  const setStatus = (rec, status) => {
    db.ref("records/" + rec.id).update({ status, statusUpdatedAt: firebase.database.ServerValue.TIMESTAMP })
      .then(() => showToast(status === ST_DONE ? "อัปเดตเป็น “ต่อกลับเรียบร้อย” แล้ว" : "เปลี่ยนกลับเป็น “ต่อตรง” แล้ว", "ok"))
      .catch(() => showToast("อัปเดตสถานะไม่สำเร็จ", "bad"));
  };
  const markDone = (rec) => { if (confirm(`ยืนยันว่าได้สับเปลี่ยน/ต่อกลับมิเตอร์ลูกที่ ${rec.brokenMeterNo} เรียบร้อยแล้ว?`)) setStatus(rec, ST_DONE); };
  const revert   = (rec) => { if (confirm("เปลี่ยนสถานะกลับเป็น “ต่อตรง”?")) setStatus(rec, ST_ACTIVE); };

  return (
    <>
      <div className="appbar">
        <div className="appbar-inner">
          <div className="logo"><BoltIcon s={24}/></div>
          <div>
            <div className="title">สถานะข้อมูลชุดอุปกรณ์ช่วยต่อตรงมิเตอร์ฉุกเฉิน</div>
            <div className="subtitle">การไฟฟ้าส่วนภูมิภาคจังหวัดลำพูน (PEA ลำพูน) · แผนกมิเตอร์</div>
          </div>
          <div className="bar-spacer"></div>
          <button className="icon-btn" title="เปลี่ยนรหัส PIN" onClick={()=>setShowPin(true)}><GearIcon/></button>
        </div>
      </div>

      <div className="wrap">
        <div className="kpis">
          <div className="kpi total"><div className="accent"></div><div className="lab">รายการทั้งหมด</div><div className="num">{stats.total}</div></div>
          <div className="kpi active"><div className="accent"></div><div className="lab">กำลังต่อตรง (รอแก้ไข)</div><div className="num">{stats.active}</div></div>
          <div className="kpi done"><div className="accent"></div><div className="lab">ต่อกลับเรียบร้อย</div><div className="num">{stats.done}</div></div>
        </div>

        <div className="devrow">
          <span className="dl">เครื่องที่กำลังใช้งาน:</span>
          {stats.devs.length === 0
            ? <span className="dev-none">— ว่างทุกเครื่อง —</span>
            : stats.devs.map(d => <span key={d} className="dev-chip">เครื่องที่ {d}</span>)}
          {stats.today > 0 && <span style={{marginLeft:'auto', color:'var(--muted)'}}>วันนี้ {stats.today} รายการ</span>}
        </div>

        <div className="toolbar">
          <select className="period-sel" value={period} onChange={(e)=>setPeriod(e.target.value)}>
            <option value="all">ทั้งหมด</option>
            <option value="thisMonth">เดือนนี้</option>
            <option value="lastMonth">เดือนที่แล้ว</option>
            <option value="thisYear">ปีนี้</option>
            {yearOptions.map(y => <option key={y} value={"year:"+y}>ปี {y+543}</option>)}
          </select>
          <div className="tabs">
            <button className={"tab"+(filter==="all"?" on":"")} onClick={()=>setFilter("all")}>ทั้งหมด<span className="cnt">{stats.total}</span></button>
            <button className={"tab"+(filter==="active"?" on":"")} onClick={()=>setFilter("active")}>ต่อตรง<span className="cnt">{stats.active}</span></button>
            <button className={"tab"+(filter==="done"?" on":"")} onClick={()=>setFilter("done")}>ต่อกลับแล้ว<span className="cnt">{stats.done}</span></button>
          </div>
          <div className="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="ค้นหา ชื่อ / เลขมิเตอร์ / ผู้ใช้ไฟ / เบอร์โทร" />
          </div>
        </div>

        <div className="table-card">
          {loading ? (
            <div className="empty">กำลังโหลดข้อมูล…</div>
          ) : filtered.length === 0 ? (
            <div className="empty"><div className="ico">📭</div><div style={{marginTop:8}}>{records.length===0 ? "ยังไม่มีรายการบันทึกเข้ามา" : "ไม่พบรายการที่ตรงกับเงื่อนไขที่เลือก"}</div></div>
          ) : (
            <>
              <div className="tscroll">
                <table>
                  <thead>
                    <tr>
                      <th>วันที่/เวลา</th><th>ผู้ดำเนินการ</th><th>มิเตอร์ลูกที่เสีย</th>
                      <th>เลขผู้ใช้ไฟ</th><th>ชื่อผู้ใช้ไฟ</th><th>เบอร์โทร</th>
                      <th>รูปมิเตอร์เสีย</th><th>รูปการติดตั้ง</th><th>เครื่องนวัตกรรม</th><th>สถานะ</th><th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(r => (
                      <tr key={r.id}>
                        <td className="dt"><div className="d">{fmtDate(r.timestamp)}</div><div className="t">{fmtTime(r.timestamp)}</div></td>
                        <td>{r.operatorName || "-"}</td>
                        <td className="meter-no">{r.brokenMeterNo || "-"}</td>
                        <td className={r.customerNo?"":"muted-cell"}>{r.customerNo || "-"}</td>
                        <td className={r.customerName?"":"muted-cell"}>{r.customerName || "-"}</td>
                        <td className={r.customerPhone?"":"muted-cell"}>{r.customerPhone || "-"}</td>
                        <td>{r.brokenThumb ? <img className="thumb" src={r.brokenThumb} onClick={()=>setLightbox({url:r.brokenPhoto, cap:"รูปมิเตอร์ที่เสียหาย"})} alt=""/> : "-"}</td>
                        <td>{r.installThumb ? <img className="thumb" src={r.installThumb} onClick={()=>setLightbox({url:r.installPhoto, cap:"รูปการติดตั้งชุดนวัตกรรม"})} alt=""/> : "-"}</td>
                        <td><span className="devbadge">{r.deviceNo}</span></td>
                        <td>
                          {r.status === ST_DONE
                            ? (<><span className="chip green"><span className="dot"></span>ต่อกลับเรียบร้อย</span><button className="revert" onClick={()=>revert(r)}>เปลี่ยนกลับ</button></>)
                            : (<><span className="chip red"><span className="dot"></span>ต่อตรง</span><button className="act-btn" onClick={()=>markDone(r)}>✓ ต่อกลับเรียบร้อย</button></>)}
                        </td>
                        <td><button className="del-btn" title="ลบรายการ" onClick={()=>setDeleteRec(r)}><TrashIcon/></button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="cards">
                {filtered.map(r => (
                  <div className="rcard" key={r.id}>
                    <div className="top">
                      <div>
                        <div className="when">{fmtDate(r.timestamp)} · {fmtTime(r.timestamp)}</div>
                        <div className="mno">มิเตอร์ {r.brokenMeterNo || "-"}</div>
                      </div>
                      {r.status === ST_DONE
                        ? <span className="chip green"><span className="dot"></span>ต่อกลับเรียบร้อย</span>
                        : <span className="chip red"><span className="dot"></span>ต่อตรง</span>}
                    </div>
                    <dl>
                      <dt>ผู้ดำเนินการ</dt><dd>{r.operatorName || "-"}</dd>
                      <dt>เครื่องนวัตกรรม</dt><dd>เครื่องที่ {r.deviceNo}</dd>
                      {r.customerNo   && (<><dt>เลขผู้ใช้ไฟ</dt><dd>{r.customerNo}</dd></>)}
                      {r.customerName && (<><dt>ชื่อผู้ใช้ไฟ</dt><dd>{r.customerName}</dd></>)}
                      {r.customerPhone&& (<><dt>เบอร์โทร</dt><dd>{r.customerPhone}</dd></>)}
                    </dl>
                    <div className="photos">
                      {r.brokenThumb && <figure><figcaption>มิเตอร์เสีย</figcaption><img src={r.brokenThumb} onClick={()=>setLightbox({url:r.brokenPhoto, cap:"รูปมิเตอร์ที่เสียหาย"})} alt=""/></figure>}
                      {r.installThumb && <figure><figcaption>การติดตั้ง</figcaption><img src={r.installThumb} onClick={()=>setLightbox({url:r.installPhoto, cap:"รูปการติดตั้งชุดนวัตกรรม"})} alt=""/></figure>}
                    </div>
                    <div className="foot">
                      {r.status === ST_DONE
                        ? <button className="revert" onClick={()=>revert(r)}>เปลี่ยนกลับเป็นต่อตรง</button>
                        : <button className="mact" onClick={()=>markDone(r)}>✓ ต่อกลับเรียบร้อย</button>}
                      <button className="del-btn" title="ลบรายการ" onClick={()=>setDeleteRec(r)}><TrashIcon/></button>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>

      {lightbox && (
        <div className="lb" onClick={()=>setLightbox(null)}>
          <button className="lb-x" onClick={()=>setLightbox(null)}>×</button>
          <img src={lightbox.url} alt="" onClick={(e)=>e.stopPropagation()} />
          <div className="lb-cap">{lightbox.cap}</div>
        </div>
      )}
      {showPin && <ChangePinModal onClose={()=>setShowPin(false)} onDone={()=>{ setShowPin(false); showToast("เปลี่ยนรหัส PIN เรียบร้อย", "ok"); }} />}
      {deleteRec && <DeleteModal rec={deleteRec} onClose={()=>setDeleteRec(null)} onDeleted={()=>{ setDeleteRec(null); showToast("ลบรายการแล้ว", "ok"); }} />}
      {toast && <div className={"toast " + (toast.type==="ok"?"ok":toast.type==="bad"?"bad":"")}>{toast.msg}</div>}
    </>
  );
}

/* ====================================================================
   ROOT + ROUTER (แยกหน้าด้วยท้าย URL: ""=ฟอร์ม, "#admin"=Dashboard)
   ==================================================================== */
function getView(){
  const h = (location.hash || "").toLowerCase().replace(/[#/]/g, "");
  return (h === "admin" || h === "dashboard") ? "admin" : "form";
}

function App(){
  const [view, setView] = useState(getView());
  const [authReady, setAuthReady] = useState(false);
  const [authErr, setAuthErr] = useState("");
  const [unlocked, setUnlocked] = useState(sessionStorage.getItem("pea_unlocked") === "1");

  // เปลี่ยนหน้าเมื่อ URL hash เปลี่ยน
  useEffect(() => {
    const f = () => setView(getView());
    window.addEventListener("hashchange", f);
    return () => window.removeEventListener("hashchange", f);
  }, []);

  // ตั้ง data-view ของ body (คุมความกว้าง) + ชื่อแท็บ
  useEffect(() => {
    document.body.dataset.view = view;
    document.title = (view === "admin" ? "สถานะข้อมูล" : "บันทึกข้อมูล") + "ชุดอุปกรณ์ช่วยต่อตรงมิเตอร์ฉุกเฉิน - PEA ลำพูน";
  }, [view]);

  // ล็อกอิน Anonymous "ทุกครั้งที่เปิดหน้า" (กันปัญหาตอนรีโหลดแล้ว session unlock ค้างไว้)
  useEffect(() => {
    auth.signInAnonymously().catch(() => setAuthErr("เชื่อมต่อฐานข้อมูลไม่ได้ ตรวจการตั้งค่า Firebase"));
    const unsub = auth.onAuthStateChanged(u => { if (u) setAuthReady(true); });
    return () => unsub();
  }, []);

  if (authErr) return <Splash msg={authErr} />;
  if (!authReady) return <Splash msg="กำลังเชื่อมต่อ…" />;
  if (!unlocked) return <PinGate onUnlock={() => setUnlocked(true)} />;
  return view === "admin" ? <Dashboard/> : <FormPage/>;
}

try { document.body.dataset.view = getView(); } catch (e) {}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
